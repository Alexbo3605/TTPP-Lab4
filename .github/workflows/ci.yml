name: CI
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4 # Оновлено до v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Оновлено до v5
        with:
          python-version: "3.11"

      # Крок "Install Docker Compose" видалено, бо він вже є на Runner-і за замовчуванням

      - name: Start LocalStack with Docker Compose
        run: |
          docker-compose up -d
          echo "Waiting for LocalStack to be ready..."
          # Чекаємо, поки контейнер (назва з вашого docker-compose.yml) стане healthy
          # Це набагато надійніше за простий sleep
          timeout 60s sh -c 'until [ "$(docker inspect -f {{.State.Health.Status}} integration_aws_test)" == "healthy" ]; do sleep 2; done'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Якщо pytest-mock не в requirements.txt, додайте його сюди:
          # pip install pytest-mock 

      - name: Run pylint
        run: | 
          pylint --fail-under 6 app

      - name: Run integration tests
        run: |
          # Встановлюємо змінні оточення, якщо вони потрібні для тестів
          pytest --maxfail=1 --disable-warnings -v
          coverage run -m pytest && coverage report -m

      - name: Teardown Docker
        if: always()
        run: docker-compose down